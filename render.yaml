services:
  - type: web
    name: skillbridge-server
    runtime: node
    nodeVersion: 20.x
    buildCommand: pnpm install && pnpm prisma generate && pnpm run build
    startCommand: pnpm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: DIRECT_URL
        sync: false
      - key: BETTER_AUTH_SECRET
        sync: false
      - key: BETTER_AUTH_URL
        sync: false
      - key: APP_URL
        value: https://skill-bridge-client-green.vercel.app